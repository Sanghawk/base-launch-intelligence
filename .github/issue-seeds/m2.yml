completion_notes: |
  Recommended completion order and dependency rationale:

  1. M2-001 Provider HTTP and sample-capture scaffolding
     Sets up the HTTP helper, env wiring, and sample-storage layout that every later issue depends on.

  2. M2-002 DEX Screener client
     Builds the thin client used by both candidate capture (M2-003) and pair capture (M2-004).

  3. M2-003 DEX Screener candidate samples
     Produces the 20+ Base candidate records. The candidate sample list is reused by M2-004, M2-006, M2-007, and M2-008 to pick token addresses to probe.

  4. M2-004 DEX Screener token-pair samples
     Captures market payloads for tokens chosen from M2-003. Depends on the candidate list existing.

  5. M2-005 GoPlus client
     Adds the thin client used by GoPlus sample capture in M2-006.

  6. M2-006 GoPlus token-security samples
     Captures risk payloads (or failure modes) for tokens chosen from M2-003. Closes the P0 sample-capture work.

  7. M2-007 GeckoTerminal client and probe (optional)
     P1 cross-check probe. Independent of M2-008 and can be skipped if the provider is unreachable.

  8. M2-008 Basescan client and probe (optional)
     P1 deployer-creator probe. Skipped cleanly when `BASESCAN_API_KEY` is unset.

  9. M2-009 Documentation pass
     Records sample layout, capture commands, and observed quirks. Runs after all P0 and P1 captures so observed behaviors are written down once.

  10. M2-010 DEX Screener candidate fallback decision
      Closes the Stage 5 risk checkpoint by either accepting DEX Screener candidate coverage or capturing samples from a documented fallback. Runs last because it needs the M2-003 outcome and the M2-009 notes file.

  Hard dependencies:
    - M2-002 depends on M2-001.
    - M2-003 and M2-004 depend on M2-002. M2-004 also depends on M2-003 for token selection.
    - M2-005 depends on M2-001.
    - M2-006 depends on M2-005 and M2-003.
    - M2-007 depends on M2-001 and M2-003.
    - M2-008 depends on M2-001 and M2-003.
    - M2-009 depends on all preceding capture work.
    - M2-010 depends on M2-003 and M2-009.
